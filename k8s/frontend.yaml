# ============================================
# Frontend — React + Nginx
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: paklawchatbot
  labels:
    app: paklawchatbot
    tier: frontend
spec:
  replicas: 1  # Frontend is stateless — safe to scale
  selector:
    matchLabels:
      app: paklawchatbot
      tier: frontend
  template:
    metadata:
      labels:
        app: paklawchatbot
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: muzammil588/paklawchatbot-frontend:f1f85bd58abdf04254235f79d6e275fd5cb22272
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          # Health check
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
# Frontend Service (NodePort or LoadBalancer for external access)
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: paklawchatbot
  labels:
    app: paklawchatbot
    tier: frontend
spec:
  type: NodePort  # Change to LoadBalancer if your cluster supports it
  selector:
    app: paklawchatbot
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080   # Accessible at http://<node-ip>:30080
      protocol: TCP
