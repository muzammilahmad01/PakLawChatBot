name: PakLawChatBot Monorepo CI/CD

on:
  push:
    branches:
      - main        # ✅ Correct — simple list item
    paths-ignore:
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Use your PAT to allow the action to push changes back
          token: ${{ secrets.REPO_GITOPS_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build & Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ChatBot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/paklaw-backend:${{ github.sha }}

      # 2. Build & Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/paklaw-frontend:${{ github.sha }}

      # 3. Update Manifests (The "Safe" Update)
      - name: Update K8s Manifests
        run: |
          # Use sed to only change the image line. 
          # It looks for 'image: ...paklaw-backend' and replaces the whole line.
          sed -i "s|image: .*paklaw-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/paklaw-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|image: .*paklaw-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/paklaw-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      # 4. Push changes back to repo
      - name: Commit and Push Manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          # [skip ci] is CRITICAL here so this commit doesn't trigger this workflow again
          git commit -m "chore: update k8s images to sha-${{ github.sha }} [skip ci]"
          git push
