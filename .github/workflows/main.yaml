# 1. Build & Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ChatBot/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/paklawchatbot-backend:${{ github.sha }}

      # 2. Build & Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/paklawchatbot-frontend:${{ github.sha }}

      # 3. Update Manifests
      - name: Update K8s Manifests
        run: |
          sed -i "s|image: .*paklawchatbot-backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/paklawchatbot-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|image: .*paklawchatbot-frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/paklawchatbot-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      # 4. Commit and Push Manifests
      - name: Commit and Push Manifests
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update k8s images to sha-${{ github.sha }} [skip ci]"
          git push